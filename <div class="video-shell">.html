<div class="video-shell">
  <iframe
    src="YOUR_VIDEO_LINK"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen
    webkitallowfullscreen
    mozallowfullscreen
    loading="lazy">
  </iframe>
</div>

<style>
  .video-shell {
    width: 100%;
    max-width: 1140px;
    aspect-ratio: 4 / 3;
    border-radius: 24px;
    overflow: hidden;
    margin: 0 auto;
    background: #000;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    position: relative;
  }

  .video-shell iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    transform: translate(-50%, -50%);
  }

  @media (max-width: 768px) {
    .video-shell {
      max-width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 18px;
    }
  }
</style>
